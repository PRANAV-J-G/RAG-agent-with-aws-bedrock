<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent - AWS Bedrock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 1200px;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" fill="white" opacity="0.1"><polygon points="0,0 1000,0 1000,60 0,100"/></svg>');
            background-size: cover;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .status-bar {
            background: #ecf0f1;
            padding: 15px 30px;
            border-bottom: 1px solid #bdc3c7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 2s infinite;
        }

        .status-dot.healthy {
            background: #2ecc71;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            gap: 30px;
        }

        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #3498db;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: #2980b9;
            background: #e3f2fd;
        }

        .upload-section.dragover {
            border-color: #27ae60;
            background: #e8f5e8;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        .chat-container {
            flex: 1;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            color: white;
            padding: 20px;
            font-weight: 600;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-height: 400px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .message.agent {
            background: linear-gradient(135deg, #ecf0f1 0%, #bdc3c7 100%);
            color: #2c3e50;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .sources {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .source {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #ecf0f1;
            gap: 15px;
        }

        .input-field {
            flex: 1;
            padding: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-field:focus {
            border-color: #3498db;
        }

        .send-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
        }

        .send-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #7f8c8d;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ecf0f1;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }

        .notification.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                min-height: 95vh;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 RAG Agent</h1>
            <p>Powered by AWS Bedrock</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Checking connection...</span>
            </div>
            <div class="status-indicator">
                <span>Session: <strong id="sessionId">None</strong></span>
            </div>
            <div class="status-indicator">
                <span>KB Status: <strong id="kbStatus">Loading...</strong></span>
            </div>
        </div>

        <div class="main-content">
            <div class="upload-section" id="uploadSection">
                <h3>📄 Upload PDF Documents</h3>
                <p>Drag and drop PDF files here or click to select</p>
                <input type="file" id="fileInput" class="file-input" accept=".pdf" multiple>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    Choose Files
                </button>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="syncKnowledgeBase()">🔄 Sync Knowledge Base</button>
                <button class="control-btn" onclick="clearChat()">🗑️ Clear Chat</button>
                <button class="control-btn" onclick="checkStatus()">📊 Check Status</button>
            </div>

            <div class="chat-container">
                <div class="chat-header">
                    💬 Chat with your Documents
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message agent">
                        <div>Hello! I'm your RAG agent. Upload some PDF documents and ask me questions about them.</div>
                        <div class="message-time">Ready to help</div>
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" class="input-field" id="questionInput" placeholder="Ask a question about your documents..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        let currentSessionId = null;
        let isLoading = false;

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            checkStatus();
            checkKnowledgeBaseStatus();
            setupFileUpload();
        });

        // Check API health status
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                if (data.status === 'healthy') {
                    statusDot.className = 'status-dot healthy';
                    statusText.textContent = 'Connected';
                } else {
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'Disconnected';
                }
            } catch (error) {
                console.error('Status check failed:', error);
                document.getElementById('statusText').textContent = 'Connection failed';
            }
        }

        // Check knowledge base status
        async function checkKnowledgeBaseStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/knowledge-base/status`);
                const data = await response.json();
                document.getElementById('kbStatus').textContent = data.status;
            } catch (error) {
                console.error('KB status check failed:', error);
                document.getElementById('kbStatus').textContent = 'Error';
            }
        }

        // Setup file upload functionality
        function setupFileUpload() {
            const uploadSection = document.getElementById('uploadSection');
            const fileInput = document.getElementById('fileInput');

            // Drag and drop functionality
            uploadSection.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadSection.classList.add('dragover');
            });

            uploadSection.addEventListener('dragleave', () => {
                uploadSection.classList.remove('dragover');
            });

            uploadSection.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadSection.classList.remove('dragover');
                const files = e.dataTransfer.files;
                handleFileUpload(files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFileUpload(e.target.files);
            });
        }

        // Handle file upload
        async function handleFileUpload(files) {
            for (const file of files) {
                if (file.type !== 'application/pdf') {
                    showNotification('Only PDF files are supported', 'error');
                    continue;
                }

                const formData = new FormData();
                formData.append('file', file);

                try {
                    showNotification(`Uploading ${file.name}...`, 'success');
                    
                    const response = await fetch(`${API_BASE_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    
                    if (response.ok) {
                        showNotification(`${file.name} uploaded successfully!`, 'success');
                        checkKnowledgeBaseStatus();
                    } else {
                        showNotification(`Upload failed: ${data.detail}`, 'error');
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    showNotification(`Upload failed: ${error.message}`, 'error');
                }
            }
        }

        // Handle key press in input field
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendQuestion();
            }
        }

        // Send question to the agent
        async function sendQuestion() {
            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();
            
            if (!question || isLoading) {
                return;
            }

            isLoading = true;
            updateSendButton();
            
            // Add user message to chat
            addMessage(question, 'user');
            questionInput.value = '';

            // Show loading message
            const loadingMessage = addMessage('', 'agent', true);

            try {
                const response = await fetch(`${API_BASE_URL}/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        session_id: currentSessionId
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // Remove loading message
                    loadingMessage.remove();
                    
                    // Add agent response
                    addMessage(data.answer, 'agent', false, data.sources);
                    
                    // Update session ID
                    currentSessionId = data.session_id;
                    document.getElementById('sessionId').textContent = currentSessionId.substring(0, 8) + '...';
                } else {
                    loadingMessage.remove();
                    addMessage(`Error: ${data.detail}`, 'agent');
                }
            } catch (error) {
                console.error('Query error:', error);
                loadingMessage.remove();
                addMessage(`Connection error: ${error.message}`, 'agent');
            } finally {
                isLoading = false;
                updateSendButton();
            }
        }

        // Add message to chat
        function addMessage(content, sender, isLoading = false, sources = []) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            if (isLoading) {
                messageDiv.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>Thinking...</span>
                    </div>
                `;
            } else {
                let sourcesHtml = '';
                if (sources && sources.length > 0) {
                    sourcesHtml = '<div class="sources"><strong>Sources:</strong>';
                    sources.forEach((source, index) => {
                        sourcesHtml += `
                            <div class="source">
                                <strong>Source ${index + 1}:</strong> ${source.content.substring(0, 200)}...
                                <br><small>Score: ${source.score}</small>
                            </div>
                        `;
                    });
                    sourcesHtml += '</div>';
                }
                
                messageDiv.innerHTML = `
                    <div>${content}</div>
                    ${sourcesHtml}
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                `;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }

        // Update send button state
        function updateSendButton() {
            const sendBtn = document.getElementById('sendBtn');
            if (isLoading) {
                sendBtn.disabled = true;
                sendBtn.textContent = 'Sending...';
            } else {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }

        // Sync knowledge base
        async function syncKnowledgeBase() {
            try {
                showNotification('Starting knowledge base sync...', 'success');
                
                const response = await fetch(`${API_BASE_URL}/knowledge-base/sync`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showNotification('Knowledge base sync started successfully!', 'success');
                    setTimeout(() => {
                        checkKnowledgeBaseStatus();
                    }, 5000);
                } else {
                    showNotification(`Sync failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                console.error('Sync error:', error);
                showNotification(`Sync failed: ${error.message}`, 'error');
            }
        }

        // Clear chat messages
        function clearChat() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = `
                <div class="message agent">
                    <div>Chat cleared. How can I help you?</div>
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            currentSessionId = null;
            document.getElementById('sessionId').textContent = 'None';
        }

        // Show notification
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 4000);
        }

        // Auto-refresh status every 30 seconds
        setInterval(() => {
            checkStatus();
            checkKnowledgeBaseStatus();
        }, 30000);
    </script>
</body>
</html>
